name: ManifestAlarm
options:
  developmentLanguage: en
  bundleIdPrefix: com.sharkvision
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "12.0.0"
targets:
  ManifestAlarm:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ManifestAlarm
    dependencies:
      - package: GoogleMobileAds
    info:
      path: ManifestAlarm/Info.plist
      properties:
        CFBundleDisplayName: Manifest Alarm
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSAlarmKitUsageDescription: "Scheduling your manifest alarm requires alarm access."
        NSMicrophoneUsageDescription: "The microphone is used to hear you say your manifest sentence to stop the alarm."
        NSSpeechRecognitionUsageDescription: "Speech recognition checks that you said your manifest sentence to stop the alarm."
        NSUserTrackingUsageDescription: "Your choice lets us show ads that are more relevant to you. The app keeps working the same either way."
