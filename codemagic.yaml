# Manifest Alarm — Mac'siz iOS derleme (Codemagic)
# theviral'daki kurulumla aynı Apple entegrasyonunu kullanır.
workflows:
  ios-testflight:
    name: Manifest Alarm iOS
    max_build_duration: 60
    integrations:
      app_store_connect: THE_VIRAL_API_KEY
    environment:
      groups:
        - signing   # CERTIFICATE_PRIVATE_KEY bu grupta (Codemagic panelinde tanımlı)
      vars:
        BUNDLE_ID: "com.sharkvision.manifestalarm"
        XCODE_PROJECT: "ios/ManifestAlarm.xcodeproj"
        XCODE_SCHEME: "ManifestAlarm"
      xcode: latest
    scripts:
      - name: Xcode projesini üret (XcodeGen)
        script: |
          brew install xcodegen || true
          xcodegen generate --spec ios/project.yml --project ios
          # Build numarasını Codemagic sayacından al (her derlemede otomatik artar)
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" ios/ManifestAlarm/Info.plist
          echo "CFBundleVersion = $BUILD_NUMBER"
      - name: İmzalama dosyalarını al/oluştur (sertifika + profil)
        script: |
          keychain initialize
          # Sabit anahtar: her derlemede aynı sertifika yeniden kullanılır
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: iOS uygulamasını derle (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
